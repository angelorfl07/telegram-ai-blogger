services:
  telegram-ai-blogger:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: telegram-ai-blogger
    restart: always
    env_file:
      - .env
    environment:
      TZ: America/Sao_Paulo
      NODE_ENV: production
    ports:
      - "3000:3000"
    volumes:
      - ./storage:/app/storage
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
